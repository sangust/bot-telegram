name: Deploy afilibot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Build e push no Docker Hub ─────────────────────────────────────
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/afilibot:latest

      # ── 3. Setup Terraform ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ── 4. Login Azure ─────────────────────────────────────────────────────
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 5. Terraform Init ──────────────────────────────────────────────────
      - name: Terraform Init
        working-directory: infra
        env:
          ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        run: terraform init

      # ── 6. Import Resource Group (se já existir na Azure) ─────────────────
      - name: Import Resource Group
        working-directory: infra
        env:
          ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          TF_VAR_ssh_public_key:            ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_db_password:               ${{ secrets.DB_PASSWORD }}
          TF_VAR_dockerhub_username:        ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_token:           ${{ secrets.DOCKERHUB_TOKEN }}
          TF_VAR_database_url:              ${{ secrets.DATABASE_URL }}
          TF_VAR_secret_key:                ${{ secrets.SECRET_KEY }}
          TF_VAR_google_client_id:          ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_google_redirect_uri:       ${{ secrets.GOOGLE_REDIRECT_URI }}
          TF_VAR_abacatepay_api_key:        ${{ secrets.ABACATEPAY_API_KEY }}
          TF_VAR_abacatepay_api_url:        ${{ secrets.ABACATEPAY_API_URL }}
          TF_VAR_abacatepay_webhook_secret: ${{ secrets.ABACATEPAY_WEBHOOK_SECRET }}
          TF_VAR_base_url:                  ${{ secrets.BASE_URL }}
          TF_VAR_bot_token_1:               ${{ secrets.BOT_TOKEN_1 }}
          TF_VAR_bot_token_2:               ${{ secrets.BOT_TOKEN_2 }}
          TF_VAR_bot_token_3:               ${{ secrets.BOT_TOKEN_3 }}
        run: |
          terraform import azurerm_resource_group.afilibot \
            /subscriptions/${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}/resourceGroups/afilibot \
            || echo "Resource group já importado ou não existe, continuando..."

      # ── 7. Terraform Apply ─────────────────────────────────────────────────
      - name: Terraform Apply
        working-directory: infra
        env:
          ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          TF_VAR_ssh_public_key:            ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_db_password:               ${{ secrets.DB_PASSWORD }}
          TF_VAR_dockerhub_username:        ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_token:           ${{ secrets.DOCKERHUB_TOKEN }}
          TF_VAR_database_url:              ${{ secrets.DATABASE_URL }}
          TF_VAR_secret_key:                ${{ secrets.SECRET_KEY }}
          TF_VAR_google_client_id:          ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_google_redirect_uri:       ${{ secrets.GOOGLE_REDIRECT_URI }}
          TF_VAR_abacatepay_api_key:        ${{ secrets.ABACATEPAY_API_KEY }}
          TF_VAR_abacatepay_api_url:        ${{ secrets.ABACATEPAY_API_URL }}
          TF_VAR_abacatepay_webhook_secret: ${{ secrets.ABACATEPAY_WEBHOOK_SECRET }}
          TF_VAR_base_url:                  ${{ secrets.BASE_URL }}
          TF_VAR_bot_token_1:               ${{ secrets.BOT_TOKEN_1 }}
          TF_VAR_bot_token_2:               ${{ secrets.BOT_TOKEN_2 }}
          TF_VAR_bot_token_3:               ${{ secrets.BOT_TOKEN_3 }}
        run: terraform apply -auto-approve

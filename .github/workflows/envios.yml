name: Deploy afilibot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID:                 ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET:             ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_SUBSCRIPTION_ID:           ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
      ARM_TENANT_ID:                 ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      TF_VAR_ssh_public_key:         ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password:            ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_dockerhub_username:     ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_dockerhub_token:        ${{ secrets.DOCKERHUB_TOKEN }}
      TF_VAR_database_url:           ${{ secrets.DATABASE_URL }}
      TF_VAR_secret_key:             ${{ secrets.SECRET_KEY }}
      TF_VAR_google_client_id:       ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_google_redirect_uri:    ${{ secrets.GOOGLE_REDIRECT_URI }}
      TF_VAR_mercadopago_access_token: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      TF_VAR_mercadopago_webhook_secret: ${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}

      TF_VAR_base_url:               ${{ secrets.BASE_URL }}
      TF_VAR_bot_token_1:            ${{ secrets.BOT_TOKEN_1 }}
      TF_VAR_bot_token_2:            ${{ secrets.BOT_TOKEN_2 }}
      TF_VAR_bot_token_3:            ${{ secrets.BOT_TOKEN_3 }}
      TF_VAR_vm_size:                ${{ secrets.AZURE_VM_SIZE != '' && secrets.AZURE_VM_SIZE || 'Standard_D2_v4' }}
      TF_VAR_worker_count:           ${{ secrets.WORKER_COUNT != '' && secrets.WORKER_COUNT || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/afilibot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/afilibot:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Import Existing Azure Resources
        working-directory: infra
        shell: bash
        run: |
          set -euo pipefail

          import_if_in_state() {
            local address="$1"
            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Resource already in Terraform state: $address"
              return 0
            fi
            return 1
          }

          import_if_exists() {
            local address="$1"
            local id="$2"

            if import_if_in_state "$address"; then
              return 0
            fi

            if az resource show --ids "$id" >/dev/null 2>&1; then
              echo "Importing existing resource into Terraform state: $address"
              terraform import "$address" "$id"
            else
              echo "Resource not found in Azure, skipping import: $address"
            fi
          }

          SUBSCRIPTION_ID="$ARM_SUBSCRIPTION_ID"
          RESOURCE_GROUP_NAME="afilibot"

          if ! import_if_in_state "azurerm_resource_group.afilibot"; then
            if [ "$(az group exists --name "$RESOURCE_GROUP_NAME")" = "true" ]; then
              echo "Importing existing resource group into Terraform state"
              terraform import \
                azurerm_resource_group.afilibot \
                "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}"
            else
              echo "Resource group not found in Azure, skipping import"
            fi
          fi

          import_if_exists \
            "azurerm_public_ip.afilibot" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/publicIPAddresses/afilibot-ip"

          import_if_exists \
            "azurerm_virtual_network.afilibot" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/virtualNetworks/afilibot-vnet"

          import_if_exists \
            "azurerm_subnet.afilibot" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/virtualNetworks/afilibot-vnet/subnets/afilibot-subnet"

          import_if_exists \
            "azurerm_network_security_group.afilibot" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/networkSecurityGroups/afilibot-nsg"

          import_if_exists \
            "azurerm_network_interface.afilibot" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/networkInterfaces/afilibot-nic"

          if ! import_if_in_state "azurerm_network_interface_security_group_association.afilibot"; then
            NIC_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/networkInterfaces/afilibot-nic"
            NSG_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/networkSecurityGroups/afilibot-nsg"
            if az resource show --ids "$NIC_ID" >/dev/null 2>&1 && az resource show --ids "$NSG_ID" >/dev/null 2>&1; then
              echo "Importing existing NIC/NSG association into Terraform state"
              terraform import \
                azurerm_network_interface_security_group_association.afilibot \
                "${NIC_ID}|${NSG_ID}"
            else
              echo "NIC/NSG association dependencies not found in Azure, skipping import"
            fi
          fi

          import_if_exists \
            "azurerm_linux_virtual_machine.afilibot" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Compute/virtualMachines/afilibot"

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

name: Deploy afilibot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_gcp_project_id:             ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_ssh_public_key:             ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password:                ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_dockerhub_username:         ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_dockerhub_token:            ${{ secrets.DOCKERHUB_TOKEN }}
      TF_VAR_database_url:               ${{ secrets.DATABASE_URL }}
      TF_VAR_secret_key:                 ${{ secrets.SECRET_KEY }}
      TF_VAR_google_client_id:           ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret:       ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_google_redirect_uri:        ${{ secrets.GOOGLE_REDIRECT_URI }}
      TF_VAR_mercadopago_access_token:   ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      TF_VAR_mercadopago_webhook_secret: ${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
      TF_VAR_base_url:                   ${{ secrets.BASE_URL }}
      TF_VAR_bot_token_1:                ${{ secrets.BOT_TOKEN_1 }}
      TF_VAR_bot_token_2:                ${{ secrets.BOT_TOKEN_2 }}
      TF_VAR_bot_token_3:                ${{ secrets.BOT_TOKEN_3 }}
      TF_VAR_machine_type:               ${{ secrets.GCP_MACHINE_TYPE != '' && secrets.GCP_MACHINE_TYPE || 'e2-medium' }}
      TF_VAR_region:                     ${{ secrets.GCP_REGION != '' && secrets.GCP_REGION || 'us-central1' }}
      TF_VAR_zone:                       ${{ secrets.GCP_ZONE != '' && secrets.GCP_ZONE || 'us-central1-b' }}
      TF_VAR_worker_count:               ${{ secrets.WORKER_COUNT != '' && secrets.WORKER_COUNT || '3' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/afilibot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/afilibot:${{ github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Create env for docker compose
        run: |
          for i in {1..5}; do
            gcloud compute ssh afilibot \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --zone=${{ env.TF_VAR_zone }} \
              --quiet \
              --command="sudo mkdir -p /opt/afilibot && sudo chown $USER:$USER /opt/afilibot && cat > /opt/afilibot/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
          MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          MERCADOPAGO_WEBHOOK_SECRET=${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
          BASE_URL=${{ secrets.BASE_URL }}
          BOT_TOKEN_1=${{ secrets.BOT_TOKEN_1 }}
          BOT_TOKEN_2=${{ secrets.BOT_TOKEN_2 }}
          BOT_TOKEN_3=${{ secrets.BOT_TOKEN_3 }}
          DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/afilibot:latest
          EOF" && break || sleep 15;
          done

      - name: Deploy containers
        run: |
          REMOTE_SCRIPT=$(base64 -w 0 << 'SCRIPT'
          set -e

          for i in $(seq 1 60); do
            if command -v docker >/dev/null 2>&1 \
              && sudo docker compose version >/dev/null 2>&1 \
              && [ -f /opt/afilibot/deploy/docker-compose.yml ]; then
              break
            fi
            sleep 10
          done

          command -v docker >/dev/null 2>&1
          sudo docker compose version >/dev/null 2>&1
          test -f /opt/afilibot/deploy/docker-compose.yml
          test -f /opt/afilibot/.env

          cd /opt/afilibot
          sudo docker compose -f deploy/docker-compose.yml --env-file .env pull
          sudo docker compose -f deploy/docker-compose.yml --env-file .env up -d
          SCRIPT
          )

          gcloud compute ssh afilibot \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=${{ env.TF_VAR_zone }} \
            --quiet \
            --command="echo '${REMOTE_SCRIPT}' | base64 -d | bash -l"